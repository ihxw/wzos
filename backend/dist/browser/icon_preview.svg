<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#e0f3fe"/>
    </linearGradient>
    <linearGradient id="sun" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="mount1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b8e6b"/>
      <stop offset="100%" stop-color="#3a5a3a"/>
    </linearGradient>
    <linearGradient id="mount2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ba07b"/>
      <stop offset="100%" stop-color="#4a7a4a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9ec9"/>
      <stop offset="100%" stop-color="#3a7aa9"/>
    </linearGradient>
  </defs>
  <!-- Rounded rect background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="#e8e8ed"/>
  <!-- Sky -->
  <rect x="56" y="56" width="400" height="260" rx="8" ry="8" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="340" cy="140" r="48" fill="#ffd700" opacity="0.9"/>
  <circle cx="340" cy="140" r="36" fill="#ffec8b"/>
  <!-- Back mountain -->
  <polygon points="56,316 160,140 220,200 280,120 380,220 456,160 456,316" fill="url(#mount2)"/>
  <!-- Front mountain -->
  <polygon points="56,400 140,240 240,300 320,200 400,280 456,220 456,400" fill="url(#mount1)"/>
  <!-- Snow cap on front mountain -->
  <polygon points="320,200 340,218 300,218" fill="#fff" opacity="0.8"/>
  <!-- Water -->
  <rect x="56" y="316" width="400" height="140" fill="url(#water)"/>
  <!-- Reflection lines -->
  <line x1="180" y1="340" x2="300" y2="340" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="200" y1="360" x2="340" y2="360" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="160" y1="380" x2="320" y2="380" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg>

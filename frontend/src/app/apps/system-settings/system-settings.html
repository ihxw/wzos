<div class="settings-container">
  <div class="settings-sidebar">
    <ul nz-menu nzMode="inline">
      <li nz-menu-item [nzSelected]="selectedMenu === 'about'" (click)="selectedMenu = 'about'">
        <span>
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="margin-right: 8px;">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
          </svg>
          关于本机
        </span>
      </li>
      <li nz-menu-item [nzSelected]="selectedMenu === 'network'" (click)="selectedMenu = 'network'">
        <span>
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="margin-right: 8px;">
            <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
          </svg>
          网络
        </span>
      </li>
      <li nz-menu-item [nzSelected]="selectedMenu === 'services'" (click)="selectedMenu = 'services'">
        <span>
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="margin-right: 8px;">
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
          </svg>
          服务管理
        </span>
      </li>
    </ul>
  </div>

  <div class="settings-content">
    <div *ngIf="selectedMenu === 'about'" class="about-panel">
      <h2>关于本机</h2>
      
      <div class="info-card" *ngIf="systemInfo">
        <div class="system-logo">
          <svg viewBox="0 0 100 100" width="80" height="80">
            <circle cx="50" cy="50" r="45" fill="#667eea"/>
            <text x="50" y="65" font-size="40" text-anchor="middle" fill="white" font-family="Arial">W</text>
          </svg>
        </div>
        
        <div class="info-grid">
          <div class="info-item">
            <label>系统版本</label>
            <span>{{ systemInfo.os }}</span>
          </div>
          <div class="info-item">
            <label>主机名</label>
            <span>{{ systemInfo.hostname }}</span>
          </div>
          <div class="info-item">
            <label>运行时间</label>
            <span>{{ formatUptime(systemInfo.uptime) }}</span>
          </div>
          
          <div class="info-item full-width">
            <label>CPU 使用率</label>
            <nz-progress 
              [nzPercent]="systemInfo.cpu_usage" 
              [nzStrokeWidth]="8"
              [nzStatus]="systemInfo.cpu_usage > 80 ? 'exception' : 'normal'">
            </nz-progress>
          </div>
          
          <div class="info-item full-width">
            <label>内存使用 ({{ formatBytes(systemInfo.memory_used) }} / {{ formatBytes(systemInfo.memory_total) }})</label>
            <nz-progress 
              [nzPercent]="systemInfo.memory_usage" 
              [nzStrokeWidth]="8"
              [nzStatus]="systemInfo.memory_usage > 80 ? 'exception' : 'normal'">
            </nz-progress>
          </div>
          
          <div class="info-item full-width">
            <label>磁盘使用 ({{ formatBytes(systemInfo.disk_used) }} / {{ formatBytes(systemInfo.disk_total) }})</label>
            <nz-progress 
              [nzPercent]="systemInfo.disk_usage" 
              [nzStrokeWidth]="8"
              [nzStatus]="systemInfo.disk_usage > 80 ? 'exception' : 'normal'">
            </nz-progress>
          </div>
        </div>
      </div>
      
      <div class="loading-state" *ngIf="!systemInfo && loading">
        <p>加载系统信息中...</p>
      </div>
    </div>

    <div *ngIf="selectedMenu === 'network'" class="network-panel">
      <h2>网络信息</h2>
      <p class="placeholder-text">网络配置功能开发中...</p>
    </div>

    <div *ngIf="selectedMenu === 'services'" class="services-panel">
      <h2>系统服务管理</h2>
      <p class="placeholder-text">服务管理功能开发中...</p>
    </div>
  </div>
</div>

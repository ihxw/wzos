<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="avatar">
        <svg viewBox="0 0 100 100" width="64" height="64">
          <circle cx="50" cy="50" r="45" fill="#007aff"/>
          <path d="M50 35c-8.3 0-15 6.7-15 15s6.7 15 15 15 15-6.7 15-15-6.7-15-15-15zm0 4c6.1 0 11 4.9 11 11s-4.9 11-11 11-11-4.9-11-11 4.9-11 11-11zm0 56c-13.8 0-26-6.7-33.5-17.2C18.2 70.3 23.5 60 32 54c2.8-2 6.1-3.2 9.7-3.6 1.2-.1 2.3.4 3.1 1.2.8.8 1.2 1.9 1.2 3.1v4.8c0 1.3.5 2.5 1.4 3.4.9.9 2.1 1.4 3.4 1.4h.6c.3 0 .7 0 1 .1 1.8.3 3.5.9 5 1.8 2.8 1.7 4.6 4.8 4.6 8.3V85c0 2.2 1.8 4 4 4h0c2.2 0 4-1.8 4-4v-4.5c0-3.5 1.8-6.6 4.6-8.3 1.5-.9 3.2-1.5 5-1.8.3-.1.7-.1 1-.1h.6c1.3 0 2.5-.5 3.4-1.4.9-.9 1.4-2.1 1.4-3.4v-4.8c0-1.2.4-2.3 1.2-3.1.8-.8 1.9-1.3 3.1-1.2 3.6.4 6.9 1.6 9.7 3.6 8.5 6 13.8 16.3 15.5 23.8C76 88.3 63.8 95 50 95z" fill="white"/>
        </svg>
      </div>
      <h1>WZOS</h1>
      <p class="subtitle">请登录您的账户</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">用户名</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="输入用户名"
          autocomplete="username"
          (keydown)="onKeydown($event)"
        />
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="输入密码"
          autocomplete="current-password"
          (keydown)="onKeydown($event)"
        />
      </div>

      <button type="submit" class="login-btn" [class.loading]="loading" [disabled]="loading">
        <span *ngIf="!loading">登录</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
    </form>

    <p class="hint">可使用系统账户登录或默认账户: admin / Wz0s!A9#2026$</p>
  </div>
</div>

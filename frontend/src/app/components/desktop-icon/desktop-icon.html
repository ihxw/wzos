<div class="icon-container" (dblclick)="open()">
  <div class="icon">
    <!-- Using ng-zorro icon or image -->
    <i *ngIf="app.icon.startsWith('ant-')" nz-icon [nzType]="app.icon.replace('ant-', '')" nzTheme="outline"></i>
    <img *ngIf="!app.icon.startsWith('ant-')" [src]="app.icon" [alt]="app.name" />
  </div>
  <div class="label">{{ app.name }}</div>
</div>

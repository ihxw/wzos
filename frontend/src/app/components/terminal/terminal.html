<div class="terminal-wrapper" [style.background]="wrapperStyle.background" (contextmenu)="openContextMenu($event, termMenu)">
  <div class="terminal-container" #terminalContainer></div>

  <!-- Font settings panel -->
  <div class="font-panel" *ngIf="showFontPanel"
    [style.background]="fontPanelStyle.background"
    [style.border-color]="fontPanelStyle['border-color']"
    [style.color]="fontPanelStyle.color"
    (click)="$event.stopPropagation()">
    <div class="font-panel-header">
      <span class="font-panel-title">字体设置</span>
      <button class="font-panel-close" (click)="showFontPanel = false">&times;</button>
    </div>
    <div class="font-row">
      <span>字号</span>
      <input type="range" min="10" max="32" [value]="fontSize" (input)="setFontSize($any($event.target).value)">
      <span>{{ fontSize }}px</span>
    </div>
    <div class="font-row">
      <span>Font Family</span>
      <select [value]="fontFamily" (change)="setFontFamily($any($event.target).value)"
        [style.background]="inputStyle.background"
        [style.border-color]="inputStyle['border-color']"
        [style.color]="inputStyle.color">
        <option value="'Menlo', 'Monaco', monospace">Menlo / Monaco</option>
        <option value="'Consolas', monospace">Consolas</option>
        <option value="'Fira Code', monospace">Fira Code</option>
        <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
        <option value="'Courier New', monospace">Courier New</option>
      </select>
    </div>
  </div>
</div>

<nz-dropdown-menu #termMenu="nzDropdownMenu">
  <ul nz-menu class="term-context-menu">
    <li nz-menu-item (click)="copyText()" [nzDisabled]="!hasSelection">复制</li>
    <li nz-menu-item (click)="pasteText()">粘贴</li>
    <li nz-menu-divider></li>
    <li nz-menu-item (click)="clearTerminal()">清除</li>
    <li nz-menu-item (click)="resetTerminal()">重置</li>
    <li nz-menu-item (click)="selectAll()">全选</li>
    <li nz-menu-divider></li>
    <li nz-menu-item (click)="toggleFontPanel()">字体设置...</li>
    <li nz-menu-divider></li>
    <li nz-submenu>
      <span title>主题</span>
      <ul>
        <li nz-menu-item *ngFor="let key of themeKeys" (click)="setTheme(key)" [nzSelected]="key === currentThemeKey">
          {{ themes[key].name }}
          <span *ngIf="key === currentThemeKey" class="theme-check">✓</span>
        </li>
      </ul>
    </li>
  </ul>
</nz-dropdown-menu>
